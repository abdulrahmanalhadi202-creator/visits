<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سجل زيارات الإشراف الهندسي - بلدي</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Tahoma,Arial,sans-serif;background:#f0f4f8;color:#1a1a1a;direction:rtl}
.app{max-width:920px;margin:0 auto;padding:1rem}
.hdr{display:flex;align-items:center;justify-content:space-between;background:#fff;border-radius:14px;padding:14px 20px;margin-bottom:1rem;border:1px solid #e5e5e5;flex-wrap:wrap;gap:10px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.hdr h1{font-size:16px;font-weight:700;color:#0C447C}
.nav{display:flex;gap:6px;flex-wrap:wrap}
.nb{padding:7px 16px;font-size:13px;font-weight:500;border:1px solid #d0d0d0;border-radius:8px;background:#fff;color:#555;cursor:pointer;font-family:inherit;transition:.15s}
.nb:hover{background:#f0f0f0}
.nb.on{background:#185FA5;color:#fff;border-color:#185FA5}
.card{background:#fff;border-radius:14px;padding:20px;margin-bottom:1rem;border:1px solid #e5e5e5;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.view{display:none}
.view.on{display:block}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.field{margin-bottom:12px}
label{display:block;font-size:12px;color:#666;margin-bottom:5px;font-weight:600}
input,select,textarea{width:100%;padding:9px 12px;font-size:14px;border:1.5px solid #d8d8d8;border-radius:9px;background:#fff;color:#1a1a1a;font-family:inherit;transition:.15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:#185FA5;box-shadow:0 0 0 3px rgba(24,95,165,.1)}
textarea{resize:vertical;min-height:65px}
.section-lbl{font-size:13px;font-weight:700;color:#1a1a1a;margin-bottom:10px;padding-right:4px}
.phases{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:16px}
.ph{padding:10px 4px;border:1.5px solid #e0e0e0;border-radius:10px;background:#fafafa;cursor:pointer;text-align:center;transition:.15s}
.ph:hover{border-color:#185FA5;background:#f0f6ff}
.ph .pn{display:block;font-size:14px;font-weight:800;color:#185FA5;margin-bottom:2px}
.ph .pp{display:block;font-size:11px;font-weight:600;color:#444}
.ph .pc{display:block;font-size:10px;color:#aaa;margin-top:2px}
.ph.sel{border:2px solid #185FA5;background:#e0effc}
.ph.sel .pp{color:#0C447C}
.items{display:flex;flex-direction:column;gap:5px;margin-bottom:16px;max-height:220px;overflow-y:auto}
.itm{display:flex;align-items:center;gap:9px;padding:8px 12px;border:1.5px solid #ebebeb;border-radius:9px;background:#fff;cursor:pointer;font-size:13px;transition:.15s}
.itm:hover{border-color:#185FA5;background:#f5faff}
.itm.sel{border:2px solid #185FA5;background:#e0effc;color:#0C447C}
.itm-n{font-size:11px;color:#bbb;min-width:26px;font-weight:700}
.itm.sel .itm-n{color:#185FA5}
.badge{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:700;white-space:nowrap}
.bc{background:#dbeafe;color:#1e40af}
.be{background:#fef3c7;color:#92400e}
.bm{background:#dcfce7;color:#166534}
.bi{background:#ede9fe;color:#4c1d95}
.ba{background:#fce7f3;color:#9d174d}
.bg{background:#f1f5f9;color:#475569}
.btn-main{width:100%;padding:12px;font-size:15px;font-weight:700;border:none;border-radius:10px;background:#185FA5;color:#fff;cursor:pointer;font-family:inherit;margin-top:4px;transition:.15s}
.btn-main:hover{background:#0C447C}
.msg{font-size:13px;margin-top:10px;min-height:22px;color:#185FA5;text-align:center;font-weight:600}
.msg.err{color:#dc2626}
.other-box{background:#f0f6ff;border:1.5px solid #bcd4f0;border-radius:10px;padding:14px;margin-top:10px}
.other-box label{color:#185FA5;font-size:13px;font-weight:700}
@media(max-width:600px){.g2{grid-template-columns:1fr}.phases{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body>
<div class="app">

    <h1>🏗 سجل زيارات الإشراف الهندسي · بلدي</h1>

      <div class="g2">

        <div class="field"><label>التخصص</label>

            <option value="إدارة فريق الإشراف">إدارة فريق الإشراف</option>
          </select>
        </div>
      </div>

      <div class="section-lbl">اختر المرحلة</div>
      <div class="phases" id="phases-el"></div>

      <div id="items-wrap" style="display:none">
        <div class="section-lbl">اختر البند المُستلَم</div>
        <div class="items" id="items-el"></div>
      </div>

      <!-- مرحلة أخرى -->
      <div id="other-wrap" style="display:none" class="other-box">
        <div class="field"><label>وصف الزيارة الإضافية</label>
          <textarea id="other-desc" placeholder="اكتب غرض الزيارة أو الملاحظة..."></textarea>
        </div>
      </div>

      <div class="field" style="margin-top:8px"><label>ملاحظات إضافية (اختياري)</label>
        <textarea id="notes" placeholder="أي ملاحظات..."></textarea>
      </div>

      <button class="btn-main" onclick="save()">✓ تسجيل الزيارة</button>
      <div class="msg" id="msg"></div>
    </div>
  </div>

</div>

const GS_URL = 'https://script.google.com/macros/s/AKfycbzG7RcJGKIdIWZ2RpC2z48FP-AXS8OUbUIDuXIz7BAtyFP55Ip-5XjrO_NRvI2AUylB/exec';
const SK = 'baladi_v4';
const MONTH_NAMES = ['','يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];

let visits = [], selPhase = null, selItem = null, isOther = false;

function badge(s) {
  if (!s) return '';
  if (s.includes('كهربائي')) return `<span class="badge be">${s}</span>`;
  if (s.includes('ميكانيكا')) return `<span class="badge bm">${s}</span>`;
  if (s.includes('إدارة')) return `<span class="badge bi">${s}</span>`;
  if (s.includes('معماري')) return `<span class="badge ba">${s}</span>`;
  if (s.includes('مساح')) return `<span class="badge bg">${s}</span>`;
  return `<span class="badge bc">${s}</span>`;
}

function nav(id, btn) {
  document.querySelectorAll('.nb').forEach(b => b.classList.remove('on'));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('v-' + id).classList.add('on');
  if (id === 'log') { updateFilters(); renderLog(); }
}

function initPhases() {
  const el = document.getElementById('phases-el');
  el.innerHTML = PHASES.map(p =>
    `<div class="ph" id="ph${p.id}" onclick="pickPhase(${p.id})">
      <span class="pn">${p.name}</span>
      <span class="pp">${p.desc.length > 14 ? p.desc.slice(0,14)+'…' : p.desc}</span>
      <span class="pc">${p.items.length} بند</span>
    </div>`
  ).join('') + `<div class="ph" id="ph0" onclick="pickOther()">
    <span class="pn" style="color:#475569">+</span>
    <span class="pp" style="color:#475569">أخرى</span>
    <span class="pc">زيارة إضافية</span>
  </div>`;
}

function pickPhase(id) {
  selPhase = PHASES.find(p => p.id === id);
  selItem = null;
  isOther = false;
  document.querySelectorAll('.ph').forEach(e => e.classList.remove('sel'));
  document.getElementById('ph' + id).classList.add('sel');
  document.getElementById('items-wrap').style.display = 'block';
  document.getElementById('other-wrap').style.display = 'none';
  document.getElementById('items-el').innerHTML = selPhase.items.map(i =>
    `<div class="itm" id="it${i.n}" onclick="pickItem(${i.n})">
      <span class="itm-n">${i.n}</span>
      <span style="flex:1">${i.d}</span>
      ${badge(i.s)}
    </div>`
  ).join('');
}

function pickOther() {
  selPhase = null; selItem = null; isOther = true;
  document.querySelectorAll('.ph').forEach(e => e.classList.remove('sel'));
  document.getElementById('ph0').classList.add('sel');
  document.getElementById('items-wrap').style.display = 'none';
  document.getElementById('other-wrap').style.display = 'block';
}

function pickItem(n) {
  selItem = selPhase.items.find(i => i.n === n);
  document.querySelectorAll('.itm').forEach(e => e.classList.remove('sel'));
  document.getElementById('it' + n).classList.add('sel');
  const sp = document.getElementById('spec');
  const s = selItem.s;
  if (s.includes('كهربائي')) sp.value = 'مهندس كهربائي';
  else if (s.includes('ميكانيكا')) sp.value = 'مهندس ميكانيكا';
  else if (s.includes('إدارة')) sp.value = 'إدارة فريق الإشراف';
  else if (s.includes('مراقب')) sp.value = 'مراقب معماري';
  else if (s.includes('مهندس معماري')) sp.value = 'مهندس معماري';
  else if (s.includes('مساح')) sp.value = 'مساح';
  else sp.value = 'مهندس مدني';
}

function save() {
  const date = document.getElementById('d').value;
  const proj = document.getElementById('proj').value;
  const eng = document.getElementById('eng').value.trim();
  const spec = document.getElementById('spec').value;
  const notes = document.getElementById('notes').value.trim();
  const msg = document.getElementById('msg');

  if (!date || !proj || !eng) { msg.className='msg err'; msg.textContent='التاريخ والمشروع والاسم مطلوبة.'; return; }

  let phase = '', itemNum = '', itemDesc = '';

  if (isOther) {
    const otherDesc = document.getElementById('other-desc').value.trim();
    if (!otherDesc) { msg.className='msg err'; msg.textContent='اكتب وصف الزيارة الإضافية.'; return; }
    phase = 'أخرى'; itemNum = '-'; itemDesc = otherDesc;
  } else {
    if (!selPhase || !selItem) { msg.className='msg err'; msg.textContent='اختر المرحلة والبند.'; return; }
    phase = selPhase.name + ' ' + selPhase.desc;
    itemNum = selItem.n;
    itemDesc = selItem.d;
  }

  const v = { id: Date.now(), date, project: proj, eng, spec, phase, itemNum, itemDesc, notes };
  visits.push(v);
  try { localStorage.setItem(SK, JSON.stringify(visits)); } catch(e) {}

  msg.className = 'msg';
  msg.textContent = `✓ تم تسجيل: ${phase} - ${itemNum === '-' ? itemDesc.slice(0,30) : 'بند ' + itemNum}`;

  sendToSheets(v);

  // Reset
  document.getElementById('notes').value = '';
  document.getElementById('other-desc').value = '';
  selItem = null; isOther = false;
  document.querySelectorAll('.itm,.ph').forEach(e => e.classList.remove('sel'));
  document.getElementById('items-wrap').style.display = 'none';
  document.getElementById('other-wrap').style.display = 'none';
  setTimeout(() => { msg.textContent = ''; }, 4000);
}

function sendToSheets(v) {
  const params = Object.keys(v).filter(k => k !== 'id').map(k =>
    encodeURIComponent(k) + '=' + encodeURIComponent(v[k] || '')
  ).join('&');
  fetch(GS_URL + '?' + params, { method: 'GET', mode: 'no-cors' })
    .catch(() => {});
}




// Init
document.getElementById('d').value = new Date().toISOString().slice(0,10);
try { const r = localStorage.getItem(SK); if (r) visits = JSON.parse(r); } catch(e) {}
initPhases();
